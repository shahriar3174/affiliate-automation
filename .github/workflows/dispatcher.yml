name: Dispatcher

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run dispatcher
        run: python -m src.dispatcher
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          AFFILIATE_TAG_PINTEREST: ${{ secrets.AFFILIATE_TAG_PINTEREST }}
          AFFILIATE_TAG_FACEBOOK: ${{ secrets.AFFILIATE_TAG_FACEBOOK }}
          AFFILIATE_TAG_INSTAGRAM: ${{ secrets.AFFILIATE_TAG_INSTAGRAM }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_ACCOUNT_ID_PINTEREST: ${{ secrets.ZERNIO_ACCOUNT_ID_PINTEREST }}
          ZERNIO_ACCOUNT_ID_FACEBOOK: ${{ secrets.ZERNIO_ACCOUNT_ID_FACEBOOK }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
